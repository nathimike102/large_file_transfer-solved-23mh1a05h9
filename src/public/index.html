<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | Large File Transfer</title>
    <meta name="description" content="High-performance, secure, and reliable large file transfer service with chunked upload capabilities.">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Antigravity</h1>
            <p style="color: var(--text-muted)">High-Performance Large File Transfer Service</p>
        </header>

        <main>
            <section class="glass-card">
                <div class="upload-zone" id="drop-zone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h2>Drag & Drop Files Here</h2>
                    <p style="margin: 0.5rem 0 1.5rem; color: var(--text-muted)">or click to browse your computer</p>
                    <button class="btn" id="browse-btn">Select File</button>
                    <input type="file" id="file-input">
                </div>

                <div class="progress-container" id="progress-container">
                    <div class="progress-info">
                        <span id="file-name-display">filename.zip</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <p id="chunk-info" style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">Uploading chunk 0 of 0...</p>
                </div>
            </section>

            <section class="glass-card">
                <h2 style="margin-bottom: 1.5rem;">Recent Transfers</h2>
                <div class="file-list" id="file-list">
                    <p id="no-files" style="text-align: center; color: var(--text-muted); padding: 2rem;">No transfers yet. Start by uploading a file.</p>
                </div>
            </section>
        </main>
    </div>

    <footer>
        &copy; 2026 Antigravity File Transfer. All rights reserved.
    </footer>

    <script src="index.js"></script>
</body>
</html>
